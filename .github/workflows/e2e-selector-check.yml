name: "E2E YouTube Selector Health Check"

on:
  schedule:
    - cron: '0 0 * * 0' # Run weekly
  workflow_dispatch: # Allow manual trigger

jobs:
  test:
    name: "Check Selectors"
    runs-on: ubuntu-latest
    permissions:
      issues: write # Need permission to create issues
      contents: read
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chromium
      
    - name: Run Playwright tests
      run: npx playwright test test/e2e
      
    - name: Create Issue on Failure
      if: failure()
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: "🚨 YouTube DOM Selectors Check Failed",
            body: "The automated Playwright E2E test detected that some critical YouTube DOM selectors might have changed.\n\nPlease check the Actions tab for more details: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            labels: ['bug', 'maintenance']
          })
